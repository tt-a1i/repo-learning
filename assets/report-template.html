<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Repo Learning Report Template</title>
<style>
:root {
  --bg:#e9eef2; --ink:#15202b; --muted:#5b6b7a; --panel:#ffffff;
  --edge:#c9d3dc; --accent:#1f4b7a;
  --serif:"Iowan Old Style", Palatino, Georgia, serif;
  --sans:"Avenir Next", "Segoe UI", Helvetica, Arial, sans-serif;
}
body { margin:0; font:16px/1.6 var(--sans); background:var(--bg); color:var(--ink); }
main { max-width:980px; margin:0 auto; padding:32px 20px 64px; }
.hero { background:var(--panel); border:1px solid var(--edge); border-left:5px solid var(--accent); padding:24px; margin-bottom:20px; }
.hero h1 { font:600 2rem/1.15 var(--serif); margin:0 0 8px; }
.panel { background:var(--panel); border:1px solid var(--edge); padding:20px; margin:16px 0; }
.panel h2 { font:600 1.3rem/1.2 var(--serif); margin:0 0 12px; padding-bottom:8px; border-bottom:1px solid var(--edge); }
.chart { width:100%; height:auto; display:block; margin:12px 0; }
</style>
</head>
<body>
<main>
<header class="hero"><p style="color:var(--accent);letter-spacing:.12em;text-transform:uppercase;font-size:11px;font-weight:600">Repo brief</p><h1>Repo Learning Report</h1><p>Self-contained offline template reference — editorial brief, not a dashboard.</p></header>
<section id="overview" class="panel"><h2>Overview</h2></section>
<section id="topology" class="panel"><h2>Topology</h2>
<svg class="chart" viewBox="0 0 640 120" aria-hidden="true"><rect x="20" y="30" width="160" height="48" rx="2" fill="currentColor" opacity=".08"/><text x="36" y="52">module-a</text><text x="36" y="68" fill="#5b6b7a" font-size="11">Domain/Lib</text></svg>
</section>
<section id="dependencies" class="panel"><h2>Dependencies</h2></section>
<section id="flows" class="panel"><h2>Flows</h2></section>
<section id="risks" class="panel"><h2>Risks</h2></section>
<section id="tests" class="panel"><h2>Tests</h2></section>
<section id="roadmap" class="panel"><h2>Learning path</h2></section>
<section id="appendix" class="panel"><h2>Appendix</h2></section>
<script id="report-data" type="application/json">{"schema_version":"1","meta":{"repo_name":"template"}}</script>
</main>
</body>
</html>
